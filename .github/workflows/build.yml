name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v3
        with:
          swift-version: "6.2"
          skip-verify-signature: true

      - name: Build
        run: swift build

      - name: Test
        run: swift test --enable-code-coverage

      - name: Generate Coverage Report
        if: github.event_name == 'pull_request'
        run: |
          BIN_PATH=$(swift build --show-bin-path)
          BINARY=$(find "$BIN_PATH" -name "*.xctest" -maxdepth 1 | head -1)
          readarray -d '' PROFRAW_FILES < <(find "$BIN_PATH" -name "*.profraw" -print0)
          PROFDATA_DIR=$(dirname "${PROFRAW_FILES[0]}")
          llvm-profdata merge "${PROFRAW_FILES[@]}" -o "$PROFDATA_DIR/default.profdata"
          llvm-cov report "$BINARY" \
            -instr-profile "$PROFDATA_DIR/default.profdata" \
            --ignore-filename-regex=".build|Tests" \
            > coverage-report.txt
          cat coverage-report.txt

      - name: Comment Coverage on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('coverage-report.txt', 'utf8');
            const body = `## Code Coverage\n\`\`\`\n${report}\n\`\`\``;
            const marker = '## Code Coverage';

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.data.find(c => c.body.startsWith(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
