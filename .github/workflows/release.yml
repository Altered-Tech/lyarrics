name: Release

on:
  workflow_run:
    workflows: ["Version"]
    types: [completed]

jobs:
  check:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      has_release: ${{ steps.tag.outputs.has_release }}
      tag: ${{ steps.tag.outputs.name }}
      version: ${{ steps.tag.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for new release tag
        id: tag
        run: |
          git fetch --tags --force
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$TAG" ]; then
            echo "has_release=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          TAG_SHA=$(git rev-list -n 1 "$TAG")
          HEAD_SHA=$(git rev-parse HEAD)
          if [ "$TAG_SHA" = "$HEAD_SHA" ]; then
            echo "has_release=true" >> $GITHUB_OUTPUT
            echo "name=$TAG" >> $GITHUB_OUTPUT
            echo "version=${TAG#v}" >> $GITHUB_OUTPUT
          else
            echo "has_release=false" >> $GITHUB_OUTPUT
          fi

  build-macos:
    needs: check
    if: needs.check.outputs.has_release == 'true'
    strategy:
      matrix:
        include:
          - os: macos-15
            arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v3
        with:
          swift-version: "6.2"
          skip-verify-signature: true

      - name: Inject version
        run: |
          printf 'public let appVersion = "%s"\n' "${{ needs.check.outputs.version }}" > Sources/LRCLib/Version.swift

      - name: Build
        run: swift build -c release --product lyarrics

      - name: Package
        run: |
          cp .build/release/lyarrics lyarrics
          tar -czf lyarrics-${{ needs.check.outputs.tag }}-macos-${{ matrix.arch }}.tar.gz lyarrics

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lyarrics-macos-${{ matrix.arch }}
          path: lyarrics-${{ needs.check.outputs.tag }}-macos-${{ matrix.arch }}.tar.gz

  build-linux:
    needs: check
    if: needs.check.outputs.has_release == 'true'
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
          - os: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v3
        with:
          swift-version: "6.2"
          skip-verify-signature: true

      - name: Inject version
        run: |
          printf 'public let appVersion = "%s"\n' "${{ needs.check.outputs.version }}" > Sources/LRCLib/Version.swift

      - name: Build
        run: swift build -c release --product lyarrics --static-swift-stdlib

      - name: Package
        run: |
          cp .build/release/lyarrics lyarrics
          tar -czf lyarrics-${{ needs.check.outputs.tag }}-linux-${{ matrix.arch }}.tar.gz lyarrics

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lyarrics-linux-${{ matrix.arch }}
          path: lyarrics-${{ needs.check.outputs.tag }}-linux-${{ matrix.arch }}.tar.gz

  release:
    needs: [check, build-macos, build-linux]
    if: needs.check.outputs.has_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check.outputs.tag }}
          generate_release_notes: true
          files: |
            lyarrics-macos-arm64/*.tar.gz
            lyarrics-linux-x86_64/*.tar.gz
            lyarrics-linux-arm64/*.tar.gz

  docker:
    needs: [check, build-linux]
    if: needs.check.outputs.has_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: lyarrics-linux-*
          merge-multiple: true

      - name: Stage binaries for Docker
        run: |
          tar -xzf lyarrics-${{ needs.check.outputs.tag }}-linux-x86_64.tar.gz && mv lyarrics lyarrics-amd64
          tar -xzf lyarrics-${{ needs.check.outputs.tag }}-linux-arm64.tar.gz && mv lyarrics lyarrics-arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.check.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.check.outputs.tag }}
            type=semver,pattern={{major}},value=${{ needs.check.outputs.tag }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
            VERSION=${{ needs.check.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
