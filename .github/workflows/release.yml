name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    strategy:
      matrix:
        include:
          - os: macos-15
            arch: arm64
          - os: macos-13
            arch: x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v3
        with:
          swift-version: "6.2"
          skip-verify-signature: true

      - name: Inject version
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          printf 'public let appVersion = "%s"\n' "$VERSION" > Sources/LRCLib/Version.swift

      - name: Build
        run: swift build -c release --product lyarrics

      - name: Package
        run: |
          cp .build/release/lyarrics lyarrics
          tar -czf lyarrics-${{ github.ref_name }}-macos-${{ matrix.arch }}.tar.gz lyarrics

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lyarrics-macos-${{ matrix.arch }}
          path: lyarrics-${{ github.ref_name }}-macos-${{ matrix.arch }}.tar.gz

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v3
        with:
          swift-version: "6.2"
          skip-verify-signature: true

      - name: Inject version
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          printf 'public let appVersion = "%s"\n' "$VERSION" > Sources/LRCLib/Version.swift

      - name: Build
        run: swift build -c release --product lyarrics --static-swift-stdlib

      - name: Package
        run: |
          cp .build/release/lyarrics lyarrics
          tar -czf lyarrics-${{ github.ref_name }}-linux-x86_64.tar.gz lyarrics

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lyarrics-linux-x86_64
          path: lyarrics-${{ github.ref_name }}-linux-x86_64.tar.gz

  release:
    needs: [build-macos, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            lyarrics-macos-arm64/*.tar.gz
            lyarrics-macos-x86_64/*.tar.gz
            lyarrics-linux-x86_64/*.tar.gz

  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
            VERSION=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
